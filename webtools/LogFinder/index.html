<style>
  /* Minimal "status pill" theme for live telemetry */
  #battery_status_banner {
    display: none;
    margin: 8px 0;
    padding: 10px 12px;
    max-width: 1200px;
    border-radius: 10px;
    font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.2;
    border: 1px solid rgba(0,0,0,0.10);
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    color: #0f172a;
    box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
  }
  #battery_status_banner .muted { color: rgba(15,23,42,0.60); }
  #battery_status_banner .dot {
    display:inline-block;
    width: 10px;
    height: 10px;
    border-radius: 999px;
    margin-right: 8px;
    vertical-align: -1px;
    background: #22c55e;
    box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
  }
  #battery_status_banner.stale .dot {
    background: #f59e0b;
    box-shadow: 0 0 0 3px rgba(245,158,11,0.18);
  }
</style>

<div id="battery_status_banner"></div>

<div id="inventory"></div>
<div id="tables"></div>

<script>

  if (typeof tippy !== 'function') {
    console.warn('tippy failed to load, falling back to no-op tooltips')
    window.tippy = function() { return null }
  }

  window.onerror = function(msg, url, linenumber) {
      if (msg == "ResizeObserver loop completed with undelivered notifications.") {
          // This happens when tables are resized, I'm not sure why but the alert is annoying
          console.log(msg);
          return
      }
      alert('Sorry, something went wrong.\n\n' + 
            'Please try a hard reload of this page to clear its cache.\n\n' +
            'If the error persists open an issue on the GitHub repo.\n' +
            'Include a copy of the log and the following error message:\n\n' +
            msg + '\n' +
            'URL: '+ url +'\n' +
            'Line Number: '+ linenumber)
  }
  window.addEventListener('unhandledrejection', function (e) {
    throw new Error(e.reason.stack)
  })

  // Load tool tips
  tippy('#TT')

  init_loading_overlay()

</script>

<!-- Servo Configuration Modal -->
<style>
  #servo_config_modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0,0,0,0.4);
  }
  .servo-modal-content {
    background-color: #fefefe;
    margin: 10% auto;
    padding: 20px;
    border: 1px solid #888;
    width: 560px;
    border-radius: 8px;
    font-family: sans-serif;
  }
  .servo-modal-content h2 { margin-top: 0; }
  .servo-form-group { margin-bottom: 12px; }
  .servo-form-group label { display: inline-block; width: 150px; font-weight: bold; }
  .servo-form-group input { width: 100px; padding: 4px; }
  .servo-actions { margin-top: 20px; text-align: right; }
  .servo-actions button { padding: 6px 12px; margin-left: 8px; cursor: pointer; }
</style>

<div id="servo_config_modal">
  <div class="servo-modal-content">
    <h2>Configure Servos</h2>
    <div style="color:#666; margin-bottom: 15px; font-size:12px;">Live updates applied instantly on Save.</div>
    
    <h3>ST3215</h3>
    <div class="servo-form-group"><label>Min Angle:</label><input type="number" id="st_min" value="0"></div>
    <div class="servo-form-group"><label>Max Angle:</label><input type="number" id="st_max" value="4095"></div>
    <div class="servo-form-group"><label>Home Offset:</label><input type="number" id="st_home" value="0"></div>

    <h3>SC09 (ID 2)</h3>
    <div class="servo-form-group"><label>Min Angle:</label><input type="number" id="sc09_2_min" value="0"></div>
    <div class="servo-form-group"><label>Max Angle:</label><input type="number" id="sc09_2_max" value="1023"></div>

    <h3>SC09 (ID 3)</h3>
    <div class="servo-form-group"><label>Min Angle:</label><input type="number" id="sc09_3_min" value="0"></div>
    <div class="servo-form-group"><label>Max Angle:</label><input type="number" id="sc09_3_max" value="1023"></div>

    <h3>Live Control</h3>
    <div class="servo-form-group">
      <label>Servo:</label>
      <select id="servo_id" style="width:108px; padding:4px;">
        <option value="1">ST3215 ID 1</option>
        <option value="2">SC09 ID 2</option>
        <option value="3">SC09 ID 3</option>
        <option value="all">All</option>
      </select>
    </div>
    <div class="servo-form-group"><label>Position:</label><input type="number" id="servo_position" value="2048"></div>
    <div class="servo-form-group"><label>Speed:</label><input type="number" id="servo_speed" value="500"></div>
    <div class="servo-form-group"><label>Acceleration:</label><input type="number" id="servo_acc" value="50"></div>
    <div class="servo-actions" style="text-align:left;">
      <button onclick="refreshServoStatus()">Read Status</button>
      <button onclick="moveServo()">Move</button>
      <button onclick="moveServoHome()">Home</button>
      <button onclick="resetServoHome()">Reset Home</button>
      <button onclick="setServoTorque(true)">Torque</button>
      <button onclick="setServoTorque(false)">Untorque</button>
    </div>
    <pre id="servo_status" style="background:#0f172a;color:#e2e8f0;padding:10px;max-height:180px;overflow:auto;border-radius:6px;font-size:12px;">Status not loaded.</pre>

    <div class="servo-actions">
      <button onclick="closeServoConfigModal()">Cancel</button>
      <button onclick="saveServoConfig()" style="background:#22c55e; color:white; border:none; border-radius:4px;">Save & Apply</button>
    </div>
  </div>
</div>

<script>
  function servoApiUrl(path) {
    var apiUrl = path;
    var srvInput = document.getElementById('server_url');
    if (srvInput && srvInput.value) {
       try {
           var url = new URL(srvInput.value);
           apiUrl = url.origin + path;
       } catch(e) {}
    }
    return apiUrl;
  }

  function selectedServoId() {
    return document.getElementById('servo_id').value;
  }

  function showServoStatus(data) {
    document.getElementById('servo_status').textContent = JSON.stringify(data, null, 2);
  }

  function openServoConfigModal() {
    document.getElementById('servo_config_modal').style.display = 'block';

    fetch(servoApiUrl('/api/servo-config'))
      .then(r => r.json())
      .then(data => {
        if(data.st3215) {
          document.getElementById('st_min').value = data.st3215.min;
          document.getElementById('st_max').value = data.st3215.max;
          document.getElementById('st_home').value = data.st3215.home;
        }
        if(data.sc09_2) {
          document.getElementById('sc09_2_min').value = data.sc09_2.min;
          document.getElementById('sc09_2_max').value = data.sc09_2.max;
        }
        if(data.sc09_3) {
          document.getElementById('sc09_3_min').value = data.sc09_3.min;
          document.getElementById('sc09_3_max').value = data.sc09_3.max;
        }
        refreshServoStatus();
      }).catch(err => {
        console.error("Failed to load servo config:", err);
      });
  }

  function closeServoConfigModal() {
    document.getElementById('servo_config_modal').style.display = 'none';
  }

  function saveServoConfig() {
    var data = {
      st3215: {
        min: parseInt(document.getElementById('st_min').value) || 0,
        max: parseInt(document.getElementById('st_max').value) || 4095,
        home: parseInt(document.getElementById('st_home').value) || 0
      },
      sc09_2: {
        min: parseInt(document.getElementById('sc09_2_min').value) || 0,
        max: parseInt(document.getElementById('sc09_2_max').value) || 1023
      },
      sc09_3: {
        min: parseInt(document.getElementById('sc09_3_min').value) || 0,
        max: parseInt(document.getElementById('sc09_3_max').value) || 1023
      }
    };

    fetch(servoApiUrl('/api/servo-config'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    })
    .then(r => r.json())
    .then(res => {
      if(res.error) alert("Error saving: " + res.error);
      else {
        showServoStatus(res);
        refreshServoStatus();
      }
    })
    .catch(err => {
      alert("Network error while saving.");
      console.error(err);
    });
  }

  function postServoAction(payload) {
    return fetch(servoApiUrl('/api/servo-action'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(r => r.json())
    .then(data => {
      showServoStatus(data);
      if (data.error) {
        alert(data.error);
      }
      return data;
    })
    .catch(err => {
      alert("Servo command failed.");
      console.error(err);
    });
  }

  function refreshServoStatus() {
    fetch(servoApiUrl('/api/servo-status'))
      .then(r => r.json())
      .then(showServoStatus)
      .catch(err => {
        document.getElementById('servo_status').textContent = "Failed to read status: " + err;
      });
  }

  function moveServo() {
    var id = selectedServoId();
    if (id === 'all') {
      alert("Select one servo for Move.");
      return;
    }
    postServoAction({
      action: 'move',
      id: parseInt(id),
      position: parseInt(document.getElementById('servo_position').value),
      speed: parseInt(document.getElementById('servo_speed').value),
      acc: parseInt(document.getElementById('servo_acc').value) || 50
    }).then(refreshServoStatus);
  }

  function moveServoHome() {
    postServoAction({ action: 'home', id: selectedServoId() }).then(refreshServoStatus);
  }

  function resetServoHome() {
    if (!confirm("Reset home calibration for the selected servo?")) {
      return;
    }
    postServoAction({ action: 'reset_home', id: selectedServoId() }).then(data => {
      if (data && data.config && data.config.st3215) {
        document.getElementById('st_home').value = data.config.st3215.home;
      }
      refreshServoStatus();
    });
  }

  function setServoTorque(enable) {
    postServoAction({ action: 'torque', id: selectedServoId(), enable: enable }).then(refreshServoStatus);
  }
</script>

</body>
</html>
